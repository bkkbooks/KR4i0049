body:
  text: 提要作義要訣一卷詩文評類臣等謹案作義要訣一卷元倪士毅撰士毅有四書輯釋已著録是編皆當時經義之體例自宋神宗熙寧四年始以經義試士元太宗從耶律楚材之請以三科選舉經義亦居其一至仁宗皇慶二年酌議科舉條制乃定蒙古色目人第一場經問五條漢人南人第一場經疑二問限三百字以上不拘格律元統以後蒙古色目人亦增經義一道明以來科舉之文實因是而引伸者也是書所論雖規模淺狹未究文章之本原然如云第一要識明道理透徹第二要識得經文本旨分曉第三要識得古今治亂安危之大體又云長而轉換新意不害其為長短而曲折意盡不害其為短務高則多涉乎僻欲新則類乎怪下字惡乎俗而造作太過則語澀立意惡夫同而搜索太甚則理背皆後來制義之龜鑑也國家設科取士仍以經義為先我皇上聖訓諄諄釐正文體操觚之士皆知以先正為步趨是書又在明前法雖小異而理則相通録而存之或亦先河後海之義歟原序稱兼采謝氏張氏之説永樂大典注其説已載舉業筌蹄卷中故不復録今是卷適佚姑仍舊本闕之然大旨則已具於此矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀倪士毅作義要訣自序按宋初因唐制取士試詩賦省題詩及八韻律賦至神宗朝王安石為相熙寧四年辛亥議更科舉法罷詩賦以經義論䇿試士各占治詩書易周禮禮記一經此經義之始也宋之盛時如張公才叔自靖義正今日作經義者所當以為標凖至宋季則其篇甚長有定格律首有破題破題之下有接題接題第一接或二三句或四句下反接亦有正説而不反説者有小講小講後有引入題語有小講上假上假畢有過假語然後有下假有繳結以上謂之冒子然後入官題官題之下有原題原題有起語應語結語然後有正假或又有反假次有結繳有大講有上假有過假有下假有餘意亦曰從講有原經有結尾篇篇按此次序其文多拘於捉對大抵冗長繁復可厭宜今日又變更之今之經義不拘格律然亦當分冒題原題講題結題四假愚往年見宏齋曹公宋季書義説嘗取其可用於今日者摘録之兹又見南窗謝氏臨川章氏及諸家之説遂重加編輯條具於左以便初學云
