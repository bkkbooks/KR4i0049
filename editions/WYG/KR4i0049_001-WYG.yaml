  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0049_WYG_001-1a, image: WYG1482/WYG1482-0373a.png}
body:
  text: 作義要訣元倪士毅撰宏齋曹氏涇曰作文各自有體或簡或詳或雄健或穩妥不可以一律論蓋文氣隨人資禀清濁厚薄所賦不同則文辭隨之然未有無法度而可以言文者法度者何有開必有合有喚必有應首尾當照應抑揚當相發血脉宜串精神宜壯如人一身自首至足缺一不可則是一篇之中逐叚逐節逐句逐字皆不可以不宻也又曰文字大槩以純者為合格健者為有氣合格者中程度有氣者起人眼目然今人作文於二者皆易有病蓋似純者無氣燄則率畧委靡又不足以起人眼目似健者多草野則夾雜恠僻又不可以合有司程度如愚所見當於規矩之中用老蒼之體庶幾合格則不為有司所擯出竒則又非低手可及必識此意乃可進歩又論立說大要曰主張題目第一要識得道理透徹第二要識得經文本㫖分曉第三要識得古今治亂安危之大體然後一見題目胷中便有稱量然又須多看他人立意及自知厯練則胷中自然開廣又不要雷同須將文公四書子細玩味及伊洛議論大槩皆要得知則不但區處性理題目有斷制凡是題目皆識輕重皆區處得理到若所謂經㫖者亦試言其槩唐虞題目須要識得他氣象渾厚處湯武征伐須要見他不得已處商盤周誥須要見忠厚處如大禹治水之行所無事太甲之悔過伊尹一徳之告歸盤庚遷亳之為民髙宗之有志中興洛誥之倚重周公及周公切切告歸之意君奭之挽留與夫無逸之本㫖及化商一切事體皆大勢所重也則就這上立意得切者最好自此之外亦難盡言或題目散頭緒多我須與他提一箇大頭腦如王㑹龍省試義提道字串是也其題目云道積于厥躬惟斆學半念終始典于學厥徳修罔覺監於先王成憲其永無愆惟說式克欽承旁招俊乂王㑹龍義起語云人君道與心為一既欲參古人之善而無愧大臣心與君為一尤欲取天下之善而無遺蓋道無終窮不在吾身則在古人不在古人則在天下君不白聖而益求乎古臣不恃君之聖而益求乎賢此所以能致其君之備道也歟或捉題字做綱目亦如王㑹龍之提道字是也或用經句最切者如周明之百志惟熈題以勿忘勿助為主是也明之義愚未之見如林逢龍太學發解義以有徳必有言為主亦是也其題目云徳無常師主善為師善無常主協於克一俾萬姓咸曰大哉王言逢龍接題云有徳者必有言惟徳之㑹於吾君者既極其精微則言之散於天下者皆稱其廣大有如徳之所在茍擇焉而不精則言之所發必語焉而不詳矣何以為大公至正之論而息夫人之異論也哉此伊尹之告太甲蓋欲其以徳之一為言之大也餘皆不可以盡言但要𦂳者一題須要截得住須提得𦂳要處重其細碎處放輕不妨有道理合經㫖又不雷同又教人一見便曉如此便是主張大槩以此立意以此用工自當有所見也或曰行文關鍵多則響常讀熟做熟則行文自熟凡做商周題用唐虞事則精神壯觀做唐虞題用商周事則不甚好大凡義不必長亦不必短在措辭如何耳長而轉換新意不害其為長短而曲折意盡不害其為短務髙則多涉乎僻欲新則類入于怪晦則讀之使人厭淺則讀之使人輕下字惡夫俗而造作太過則語澁立意惡夫同而搜索太甚則理背皆學者所當知也又凡做君題國家題反處不可太甚只須輕輕說過存庵胡氏初翁曰聞之前軰凡做唐虞題目不尚反蓋彼時無此等不好氣象也論冒題或曰破題為一篇綱領至不可茍句法以體面為貴而包括欲其盡題句多則融化不見其不足題字少則敷演不見其有餘命意渾涵而不失於迂用字親切而不病於俗斯得之矣接題所以承接破題之意一篇主意要盡見於二三句中尤不可不用工也或曰冒頭如人頭面著不得十分多肉肉多則嫌有肥氣不雅觀也原題宏齋曹氏曰原題之體其文當圓其體當似論前軰考校多於題下看人筆端須是見識髙看文字多方於此有議論慷慨之體中間最不要露圭角又不要作成叚對文只要參差呼喚圓轉可觀大抵是喚起之後便應一應結一結然後正一叚反一叚又總繳結此為正體其反說者不必多比正叚宜減大半又或有於正叚後復作一叚或是引事或是譬喻如此議論竟不必作反叚亦可也講題愚按舊義必有餘意及考經亦曰原經今日固不拘此然遇可用處亦宜用之但不必拘泥耳宏齋論餘意原經二條摘録于後變而通之存乎其人若用亦只數句㸃綴足矣不可失之太多也宏齋曹氏曰所謂餘意乃是本題主意外尚有未盡之意則於此發之須是意新又不背主意仍於主意有情乃可這箇有數様本意所輕者於此却微與提起本題頭緒多者此處與貫而一之本意作兩倂不相關者此處與發明之本意有自本至效者此又翻轉來言之若只是本題意又來說作一片全無些斡運則徒勞耳又曰當初所以有原經者須是說這箇題目其來厯次第如何或是誰人做底事他這事是如何或是誰人說底話他這話是如何要推尋來因究竟下梢結煞方謂之原經也第一要認他先後次序倫理分曉及提得箇血脉端正然後擺布做來且如大槩稱頌事實之題當旁引事實來證主意分輕重呼喚方引入本題出處更自與他照應議論然後結之此格甚平正初無難也若是吿戒之題須要認他先後次序如太甲上中下三篇及一徳之書盤庚上中下三篇周家大誥東征召誥營洛多士遷商民這箇先後之次截然最要鋪擺仔細又不但篇目次第只一段中亦要分次第不可截斷如本題係是在前則起頭宜作議論一喚喚動即就題目說來便就此解他正意這回方纔迤􅆔轉去尋後面事使去云不特此爾後面又作如此說下梢又是如何却於本題後引來擁從而結之此一體也如本題係是在後則當起頭逐一原去其初是如何中間又如何乃引入本題却作一小片議論而結之又一體也引事不在多只要精切或得一句最切只就此一句發明全靠善於斡運耳凡引事寧可真而少不可多而雜最要識此意要知大槩起頭多是引證中間便當喚出出處然後便當解意分曉結之此又大槩原經之法也結題宏齋曹氏曰結尾亦要識體格不但用事證題而已若本題係有大節目事體則宜就此究竟到實結裹處結之此為議論到底是一格也本題用經句主張有來厯者宜於結尾喚起出處狀得分曉此有根據有首尾文字是一格也此外又有定格說唐虞治體宜以成王對之說盤庚遷亳事宜以周家化商事證之皇極之說宜以聖門事證之二典三謨亦然湯武征伐宜相照證周召告歸可互參攷三后化商皆要相串最宜識此意其他方可泛引事證耳又或本題中實有議論未盡而道理實有當發揮者又當作一叚議論不必用事亦可也引事之體既引狀本題後又須更喚一喚以已意慷慨議論斷制主意教他響朗然後結之此可以見人筆力宜耐心加工也總論以上亦據所見畧言之耳其詳不可盡也在乎即類推之以心體之自求其意於外而得胷中之活法乃有實工夫耳要是下筆之時說得首尾照應串得針線細宻歩歩思量主意句句挑得明𦂳教他讀去順溜又大槩文字全在呼喚有時數句全在數箇字挑剔得好須是十倍精神自此之外又有一項法度一篇之中凡有改叚接頭處當教他轉得全不費力而又有新體此雖小節亦看人手叚如陳懋欽省試㑹其有極義自接題小講及原題講叚原經結尾一切轉頭處並不用尋常套子如嘗謂今夫之類舊義多用嘗謂二字作原題起語今夫二字作大講起語蓋只教他人不見痕跡而又自轉換最妙者江萬里易義之體分明是於此處出竒亦法之可法者也然亦不甚𦂳要因筆漫及之作義要訣
